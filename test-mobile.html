<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Mobile - MonPlanRetraite.ca</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .mobile-frame {
            width: 375px;
            height: 667px;
            margin: 20px auto;
            border: 2px solid #333;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        .mobile-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .info {
            text-align: center;
            margin: 20px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="info">
        <h2>Test Version Mobile - MonPlanRetraite.ca</h2>
        <p>Simulation d'un iPhone (375x667px) pour tester la navigation mobile</p>
        <p><strong>Vérifications :</strong></p>
        <ul style="text-align: left; display: inline-block;">
            <li>✅ Bouton "Navigation" masqué sur mobile</li>
            <li>✅ Menu hamburger (☰) visible</li>
            <li>✅ Sélecteur de langue dans le menu mobile</li>
            <li>✅ Navigation complète accessible</li>
        </ul>
    </div>
    
    <div class="mobile-frame">
        <iframe src="http://localhost:3009/" title="Version Mobile"></iframe>
    </div>
</body>
</html>
